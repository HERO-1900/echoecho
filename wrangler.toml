name = "echoecho"
pages_build_output_dir = "public"
compatibility_date = "2026-06-01"

# 环境变量(在 Cloudflare Pages 控制台或 wrangler secret 配置,绝不进代码):
#   ENGINE_TOKEN  — 本地调研 runner 与云端的握手口令
#   LLM_BASE / LLM_KEY / LLM_MODEL — (可选,BYOK)OpenAI 兼容端点,配置后云端可直接出调研

# 独立库(2026-07-12 迁移完成,数据自 rabbitholes-pool 的 ee_* 表整体迁入;表名保留 ee_ 前缀以零改动切换)
[[d1_databases]]
binding = "DB"
database_name = "echoecho"
database_id = "2b6ce813-9d61-43f6-984c-d8ad6e521bf6"

[[r2_buckets]]
binding = "AUDIO"
bucket_name = "echoecho-audio"

[ai]
binding = "AI"
