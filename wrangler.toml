name = "echoecho"
pages_build_output_dir = "public"
compatibility_date = "2026-06-01"

# 环境变量(在 Cloudflare Pages 控制台或 wrangler secret 配置,绝不进代码):
#   ENGINE_TOKEN  — 本地调研 runner 与云端的握手口令
#   LLM_BASE / LLM_KEY / LLM_MODEL — (可选,BYOK)OpenAI 兼容端点,配置后云端可直接出调研

# 临时妥协(2026-07-05 夜):当前 API token 无 D1 创建权限,暂时复用 rabbitholes-pool 库,
# 全部表带 ee_ 前缀与 rabbitholes 完全隔离。待 token 加 D1:Edit 权限后迁移到独立库 echoecho。
[[d1_databases]]
binding = "DB"
database_name = "rabbitholes-pool"
database_id = "625ce208-261e-448d-80a4-fad05c802110"

[[r2_buckets]]
binding = "AUDIO"
bucket_name = "echoecho-audio"

[ai]
binding = "AI"
