<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>念念 EchoEcho · 开屏与结对</title>
<style>
/* ============================================================
   念念 EchoEcho · 高保真设计稿 01 / 05 · 开屏 + 结对入口
   品牌:暖纸 #FAF6F0 / 珊瑚 #E8604C / 墨青 #2C3A42
   静态 mockup,非真实功能;纯内联 CSS,无外部依赖
   ============================================================ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{
  --paper:#FAF6F0; --coral:#E8604C; --ink:#2C3A42;
  --ink60:rgba(44,58,66,.62); --ink40:rgba(44,58,66,.42);
  --line:rgba(44,58,66,.09); --coral-soft:rgba(232,96,76,.09);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#EDE5D8;
  background-image:radial-gradient(1100px 760px at 50% -8%,#F8F2E9,#E9DFD0);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 24px;color:var(--ink);
}
.page-label{font-size:13px;color:rgba(44,58,66,.52);font-style:italic;margin-bottom:14px;letter-spacing:.06em}

/* ---------- iPhone 15 Pro 外壳 ---------- */
.phone{background:#22262a;border-radius:58px;padding:11px;
  box-shadow:0 42px 84px rgba(44,58,66,.26),0 12px 26px rgba(44,58,66,.16)}
.screen{width:390px;height:844px;background:var(--paper);border-radius:47px;overflow:hidden;
  position:relative;display:flex;flex-direction:column}
.island{position:absolute;top:12px;left:50%;transform:translateX(-50%);
  width:124px;height:36px;background:#0b0d0e;border-radius:19px;z-index:60}
.statusbar{height:59px;flex:none;display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 30px 8px;font-size:15px;font-weight:600;position:relative;z-index:55;letter-spacing:.02em}
.statusbar .sicons{display:flex;align-items:center;gap:6px}
.homebar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  width:134px;height:5px;border-radius:3px;background:rgba(44,58,66,.82);z-index:70}

/* ---------- 内容区 ---------- */
.content{flex:1;overflow-y:auto;scrollbar-width:none;display:flex;flex-direction:column;
  padding:26px 28px 18px;position:relative}
.content::-webkit-scrollbar{display:none}

/* 背景装饰:极淡的巨型回声环,不抢戏 */
.bg-ring{position:absolute;border-radius:50%;border:1.5px solid rgba(232,96,76,.07);pointer-events:none}
.bg-ring.r1{width:520px;height:520px;top:-190px;right:-210px}
.bg-ring.r2{width:520px;height:520px;top:-190px;right:-210px;transform:scale(.72)}
.bg-ring.r3{width:420px;height:420px;bottom:-160px;left:-190px;border-color:rgba(44,58,66,.05)}
.bg-ring.r4{width:420px;height:420px;bottom:-160px;left:-190px;transform:scale(.7);border-color:rgba(44,58,66,.05)}

/* ---------- Logo:双圈回声波纹 ---------- */
.logo-wrap{display:flex;flex-direction:column;align-items:center;margin-top:34px}
.echo-mark{width:118px;height:118px;position:relative;display:flex;align-items:center;justify-content:center}
.echo-mark .core{width:26px;height:26px;border-radius:50%;background:var(--coral);
  box-shadow:0 6px 18px rgba(232,96,76,.35)}
.echo-mark .ring{position:absolute;border-radius:50%;border-style:solid;border-color:var(--coral)}
.echo-mark .ring.a{width:66px;height:66px;border-width:3px;opacity:.55}
.echo-mark .ring.b{width:108px;height:108px;border-width:2.5px;opacity:.22}
/* 右侧缺口小回声:回应的"另一半" */
.echo-mark .reply{position:absolute;right:-14px;top:50%;transform:translateY(-50%);
  width:9px;height:9px;border-radius:50%;background:var(--ink);opacity:.8;
  box-shadow:0 0 0 5px rgba(44,58,66,.10)}

.wordmark{margin-top:18px;font-size:42px;font-weight:800;letter-spacing:.14em;text-indent:.14em}
.wordmark-en{margin-top:8px;font-size:12px;font-weight:700;letter-spacing:.5em;text-indent:.5em;
  color:var(--coral);text-transform:uppercase}

.slogan{margin-top:22px;text-align:center;
  font-family:"Songti SC","Noto Serif SC",Georgia,"Times New Roman",serif}
.slogan .main{font-size:21px;font-weight:700;letter-spacing:.08em}
.slogan .sub{margin-top:10px;font-size:13px;color:var(--ink60);letter-spacing:.14em;font-style:italic}
.slogan .sub::before,.slogan .sub::after{content:"·";margin:0 10px;color:rgba(232,96,76,.5)}

/* ---------- 双入口 ---------- */
.entries{margin-top:auto;display:flex;flex-direction:column;gap:14px;padding-bottom:6px}
.entry{border-radius:22px;padding:20px 22px;display:flex;align-items:center;gap:16px;position:relative}
.entry .eicon{width:46px;height:46px;border-radius:50%;flex:none;
  display:flex;align-items:center;justify-content:center}
.entry .etext{flex:1;min-width:0}
.entry .etitle{font-size:17px;font-weight:700;letter-spacing:.03em}
.entry .edesc{margin-top:4px;font-size:12px;line-height:1.5}
.entry .arrow{flex:none;font-size:18px;font-weight:300}

.entry.create{background:var(--coral);color:#fff;
  box-shadow:0 14px 30px rgba(232,96,76,.32)}
.entry.create .eicon{background:rgba(255,255,255,.18)}
.entry.create .edesc{color:rgba(255,255,255,.82)}
.entry.create .arrow{color:rgba(255,255,255,.85)}

.entry.join{background:#fff;border:1.5px solid rgba(44,58,66,.13);
  box-shadow:0 8px 22px rgba(44,58,66,.06)}
.entry.join .eicon{background:var(--coral-soft)}
.entry.join .edesc{color:var(--ink60)}
.entry.join .arrow{color:var(--ink40)}

/* 邀请码示意格 */
.code-row{margin-top:10px;display:flex;gap:6px}
.code-cell{width:30px;height:36px;border-radius:9px;border:1.5px solid rgba(44,58,66,.16);
  background:var(--paper);display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:var(--ink);font-family:"SF Mono",Menlo,monospace}
.code-cell.empty{color:rgba(44,58,66,.22)}
.code-cell.caret{border-color:var(--coral);box-shadow:0 0 0 3px rgba(232,96,76,.12)}

.legal{margin-top:12px;text-align:center;font-size:10px;color:var(--ink40);line-height:1.6}
.legal b{color:var(--ink60);font-weight:600}

/* ---------- Tab 栏(未登录预览态,整体降透明度) ---------- */
.tabbar{flex:none;height:82px;background:rgba(255,255,255,.92);backdrop-filter:blur(18px);
  border-top:1px solid var(--line);display:flex;padding:9px 12px 0;position:relative;z-index:40}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:10px;letter-spacing:.05em;color:var(--ink40)}
.tab.active{color:var(--coral);font-weight:600}
.tabbar.preview{opacity:.45}
</style>
</head>
<body>

<div class="page-label">01 / 05 · 开屏 — slogan 与「建小家 / 结对」双入口(结对成功前 Tab 栏为预览态)</div>

<div class="phone">
  <div class="screen">
    <div class="island"></div>
    <div class="statusbar">
      <span>9:41</span>
      <span class="sicons">
        <!-- 信号 -->
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="#2C3A42"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#2C3A42"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#2C3A42"/><rect x="15" y="0" width="3" height="12" rx="1" fill="#2C3A42" opacity=".35"/></svg>
        <!-- Wi-Fi -->
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 10.8 6.2 8.4a3.4 3.4 0 0 1 4.6 0L8.5 10.8Z" fill="#2C3A42"/><path d="M4.2 6.3a6.4 6.4 0 0 1 8.6 0" stroke="#2C3A42" stroke-width="1.7" stroke-linecap="round"/><path d="M1.6 3.6a10 10 0 0 1 13.8 0" stroke="#2C3A42" stroke-width="1.7" stroke-linecap="round"/></svg>
        <!-- 电池 -->
        <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x=".8" y=".8" width="21" height="11.4" rx="3.4" stroke="#2C3A42" stroke-opacity=".4" stroke-width="1.2"/><rect x="2.5" y="2.5" width="14" height="8" rx="2" fill="#2C3A42"/><path d="M23.6 4.4v4.2a2.3 2.3 0 0 0 0-4.2Z" fill="#2C3A42" fill-opacity=".4"/></svg>
      </span>
    </div>

    <div class="content">
      <div class="bg-ring r1"></div><div class="bg-ring r2"></div>
      <div class="bg-ring r3"></div><div class="bg-ring r4"></div>

      <div class="logo-wrap">
        <div class="echo-mark">
          <div class="ring b"></div>
          <div class="ring a"></div>
          <div class="core"></div>
          <div class="reply"></div>
        </div>
        <div class="wordmark">念念</div>
        <div class="wordmark-en">EchoEcho</div>
      </div>

      <div class="slogan">
        <div class="main">事事有回应,句句有回响。</div>
        <div class="sub">念念不忘,必有回响</div>
      </div>

      <div class="entries">
        <div class="entry create">
          <div class="eicon">
            <!-- 小家:屋顶 + 回声点 -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 11 12 4.5 20 11v7.5a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 18.5V11Z" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="14" r="2" fill="#fff"/></svg>
          </div>
          <div class="etext">
            <div class="etitle">建个小家</div>
            <div class="edesc">创建你们的专属空间,生成邀请码递给 TA</div>
          </div>
          <div class="arrow">&#8250;</div>
        </div>

        <div class="entry join">
          <div class="eicon">
            <!-- 结对:两枚交叠圆环 -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="9.5" cy="12" r="5.5" stroke="#E8604C" stroke-width="1.8"/><circle cx="15.5" cy="12" r="5.5" stroke="#2C3A42" stroke-width="1.8" opacity=".75"/></svg>
          </div>
          <div class="etext">
            <div class="etitle">用邀请码结对</div>
            <div class="edesc">TA 已经把小家建好啦?输入 6 位邀请码加入</div>
            <div class="code-row">
              <div class="code-cell">E</div>
              <div class="code-cell">C</div>
              <div class="code-cell">H</div>
              <div class="code-cell caret">O</div>
              <div class="code-cell empty">·</div>
              <div class="code-cell empty">·</div>
            </div>
          </div>
          <div class="arrow">&#8250;</div>
        </div>
      </div>

      <div class="legal">继续即代表同意 <b>《念念服务条款》</b> 与 <b>《隐私政策》</b><br>你们说过的每句话,只留在你们的小家里</div>
    </div>

    <div class="tabbar preview">
      <div class="tab active">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3.2" fill="currentColor"/><circle cx="12" cy="12" r="7.5" stroke="currentColor" stroke-width="1.6" opacity=".45"/></svg>
        念念
      </div>
      <div class="tab">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 3.5 13.8 10.2 20.5 12 13.8 13.8 12 20.5 10.2 13.8 3.5 12 10.2 10.2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        僚机
      </div>
      <div class="tab">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4.5 10.5 12 4.5l7.5 6v8a1 1 0 0 1-1 1h-13a1 1 0 0 1-1-1v-8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        小家
      </div>
      <div class="tab">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8.5" r="3.5" stroke="currentColor" stroke-width="1.6"/><path d="M5 19.5c1.4-3.2 4-4.8 7-4.8s5.6 1.6 7 4.8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        我的
      </div>
    </div>

    <div class="homebar"></div>
  </div>
</div>

</body>
</html>
