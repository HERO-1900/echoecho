<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>念响 Reecho · 事事有回应,句句有回响</title>
<meta name="description" content="双向备忘录:说一句,句句有回响。五种人格模式可切换。">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FAF6F0">
<style>
/* ============ 主题 token(A 念响为默认) ============ */
:root{
  --bg:#FAF6F0;--card:#fff;--ink:#2C3A42;--accent:#E8604C;--accent-soft:#FBEAE6;
  --line:#EADFD2;--muted:#8a7d6e;--ok:#3E8E5A;--ok-soft:#E8F3EC;--doing:#C77B24;--doing-soft:#FCF3E3;
  --recv:#4A7BA6;--recv-soft:#E8F0F7;--radius:16px;--fs:16px;--head-font:-apple-system,"PingFang SC",sans-serif;
}
body[data-mode="B"]{--bg:#FFF8F0;--card:#fff;--ink:#33272A;--accent:#C73E3A;--accent-soft:#FBE9E4;--line:#F0DFD2;--muted:#9a8378;--radius:20px}
body[data-mode="C"]{--bg:#17121A;--card:#241B26;--ink:#EFE6D8;--accent:#C9A227;--accent-soft:#332A1a;--line:#3A2E3E;--muted:#A08FA6;--recv:#B08FC0;--recv-soft:#2E2433;--doing:#D9A441;--doing-soft:#332A18;--ok:#8FBF7F;--ok-soft:#22301F;--head-font:"Songti SC","Noto Serif SC",serif}
body[data-mode="D"]{--bg:#EFF3E4;--card:#fff;--ink:#141414;--accent:#5F7A00;--accent-soft:#E9F5C2;--line:#141414;--muted:#4c5240;--radius:10px}
body[data-mode="E"]{--bg:#F6EFE3;--card:#fff;--ink:#3A2E24;--accent:#8A2B23;--accent-soft:#F5E4E1;--line:#E5D5BE;--muted:#7a6a55;--fs:19px;--radius:20px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"PingFang SC","Noto Sans SC",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:var(--fs);transition:background .35s}
.wrap{max-width:520px;margin:0 auto;padding:0 16px calc(env(safe-area-inset-bottom) + 96px)}
h1.logo{font-size:26px;letter-spacing:2px;font-family:var(--head-font)}
.slogan{color:var(--muted);font-size:13px;margin-top:4px}
/* onboarding */
#onb{padding-top:12vh;text-align:center}
.onb-card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;margin-top:24px;text-align:left}
.seg{display:flex;background:var(--accent-soft);border-radius:12px;padding:4px;margin-bottom:16px}
.seg button{flex:1;border:0;background:transparent;padding:10px;border-radius:9px;font-size:15px;color:var(--ink)}
.seg button.on{background:var(--card);color:var(--accent);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}
input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:16px;background:var(--card);color:var(--ink);outline:none}
input:focus,textarea:focus{border-color:var(--accent)}
label{display:block;font-size:13px;color:var(--muted);margin:12px 0 6px}
.btn{display:block;width:100%;border:0;background:var(--accent);color:#fff;font-size:16px;font-weight:600;padding:15px;border-radius:14px;margin-top:18px;cursor:pointer}
/* header */
header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 10px;gap:8px}
header .sp{font-size:19px;font-weight:700;font-family:var(--head-font)}
.chip{font-size:13px;background:var(--accent-soft);color:var(--accent);padding:8px 12px;border-radius:99px;border:0;cursor:pointer;min-height:36px}
.chip.mode{font-weight:700}
.stats{display:flex;gap:10px;margin:6px 0 14px}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px}
.stat b{font-size:20px;color:var(--accent)}.stat span{display:block;font-size:12px;color:var(--muted);margin-top:2px}
body[data-mode="E"] .stats{display:none}
.eline{display:none;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 16px;margin:6px 0 14px;font-size:17px}
body[data-mode="E"] .eline{display:block}
.tabs{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.tabs button{border:1px solid var(--line);background:var(--card);border-radius:99px;padding:8px 14px;font-size:13px;color:var(--muted);cursor:pointer;min-height:38px}
.tabs button.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
body[data-mode="C"] .tabs button.on{background:var(--accent);color:#17121A;border-color:var(--accent)}
.searchrow{position:relative;margin-bottom:12px}
.searchrow input{padding-right:38px}
.searchrow .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:0;background:var(--line);color:var(--muted);width:26px;height:26px;border-radius:50%;cursor:pointer;display:none}
/* 卡片 */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;position:relative;transition:transform .2s}
body[data-mode="C"] .card{border-color:#4A3B50;box-shadow:inset 0 0 0 1px rgba(201,162,39,.15)}
body[data-mode="D"] .card{border-width:2.5px;box-shadow:5px 5px 0 #141414}
body[data-mode="D"] .card:nth-child(odd){transform:rotate(.5deg)}
body[data-mode="D"] .card:nth-child(even){transform:rotate(-.5deg)}
body[data-mode="D"] .card::before{content:"";position:absolute;top:-9px;left:50%;transform:translateX(-50%) rotate(-2deg);width:74px;height:18px;background:var(--accent-soft);border:1.5px solid #141414;border-radius:3px}
body[data-mode="B"] .card.done-card{overflow:visible}
.card .decree{display:none;font-size:11px;letter-spacing:2px;color:var(--accent);margin-bottom:6px}
body[data-mode="C"] .card .decree{display:block}
.meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.txt{font-size:calc(var(--fs) + 1px);line-height:1.55;white-space:pre-wrap}
body[data-mode="E"] .txt{font-size:22px;font-weight:600}
.voice button{border:1px solid var(--line);background:var(--accent-soft);color:var(--accent);border-radius:99px;padding:8px 16px;font-size:13px;cursor:pointer;margin-top:8px;min-height:38px}
.flow{display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap}
.st{font-size:14px;padding:11px 16px;border-radius:99px;border:1.5px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;min-height:48px;min-width:48px;transition:all .2s}
body[data-mode="E"] .st{font-size:17px;padding:13px 20px}
.st.on-received{background:var(--recv-soft);color:var(--recv);border-color:var(--recv);font-weight:700}
.st.on-doing{background:var(--doing-soft);color:var(--doing);border-color:var(--doing);font-weight:700}
.st.on-done{background:var(--ok-soft);color:var(--ok);border-color:var(--ok);font-weight:700}
.st.pulse{animation:pulse2 1.6s infinite;border-color:var(--accent);color:var(--accent)}
@keyframes pulse2{50%{box-shadow:0 0 0 7px color-mix(in srgb,var(--accent) 18%,transparent)}}
.prog{width:100%;margin-top:12px;accent-color:var(--accent);height:24px}
.pct{font-size:13px;color:var(--muted)}
body[data-mode="E"] .prog,body[data-mode="E"] .pct{display:none}
.ai{margin-top:12px;border-top:1px dashed var(--line);padding-top:12px;font-size:13px}
.ai button,.ai a{border:1.5px solid var(--accent);background:transparent;color:var(--accent);border-radius:99px;padding:9px 16px;font-size:14px;cursor:pointer;text-decoration:none;display:inline-block;min-height:42px}
.ai .running{color:var(--muted)}
.note{margin-top:10px;font-size:14px;color:var(--ok);background:var(--ok-soft);border-radius:10px;padding:10px 12px}
.ghost{font-size:11px;background:var(--doing-soft);color:var(--doing);border-radius:99px;padding:3px 10px;margin-left:6px}
.stamp{position:absolute;right:14px;top:38px;width:58px;height:58px;border:2.5px solid #C0392B;border-radius:8px;color:#C0392B;display:flex;align-items:center;justify-content:center;font-family:"Songti SC",serif;font-size:13px;font-weight:800;transform:rotate(10deg);opacity:.85;pointer-events:none;line-height:1.2;text-align:center;background:rgba(192,57,43,.05)}
/* 示例空状态 */
.sample{opacity:.62;border-style:dashed}
.empty{text-align:center;color:var(--muted);padding:26px 0 10px;font-size:14px;line-height:2}
/* composer */
.composer{position:fixed;left:0;right:0;bottom:0;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:10px 16px calc(env(safe-area-inset-bottom) + 10px);z-index:20}
.composer .row{max-width:520px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
.composer textarea{flex:1;height:48px;max-height:110px;resize:none;border-radius:14px;padding:13px 12px}
.mic,.send{width:48px;height:48px;border-radius:50%;border:0;font-size:20px;cursor:pointer;flex:none}
.send{background:var(--accent);color:#fff}
.mic{background:var(--card);border:1.5px solid var(--line)}
body[data-mode="E"] .mic{width:64px;height:64px;font-size:26px;border-color:var(--accent);color:var(--accent)}
.mic.rec{background:var(--accent);color:#fff;animation:pulse 1s infinite}
@keyframes pulse{50%{transform:scale(1.12)}}
.composer.hint::after{content:"↑ 给 TA 发一件小事,从这里开始";position:absolute;top:-34px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);font-size:12px;padding:6px 14px;border-radius:99px;white-space:nowrap}
/* sheet & 弹层 */
.sheet{position:fixed;inset:0;background:rgba(20,16,22,.5);display:none;align-items:flex-end;z-index:50}
.sheet.show{display:flex}
.sheet .in{background:var(--bg);width:100%;max-width:520px;margin:0 auto;border-radius:20px 20px 0 0;padding:20px 18px calc(env(safe-area-inset-bottom) + 20px);max-height:82vh;overflow:auto}
.sheet h3{margin-bottom:14px;font-family:var(--head-font)}
.row2{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);font-size:15px;gap:10px}
.modegrid{display:grid;grid-template-columns:1fr;gap:10px}
.mcard{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:14px;padding:13px;cursor:pointer;background:var(--card)}
.mcard.on{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.mcard .sw{width:44px;height:44px;border-radius:12px;flex:none;border:1px solid rgba(0,0,0,.08)}
.mcard b{font-size:16px}.mcard p{font-size:12px;color:var(--muted);margin-top:2px}
.bigcode{text-align:center;padding:10px 0 4px}
.bigcode .code{font-size:38px;font-weight:800;letter-spacing:4px;color:var(--accent);font-family:var(--head-font)}
.bigcode p{font-size:13px;color:var(--muted);margin:8px 0 14px}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 20px;border-radius:99px;font-size:13px;z-index:99;display:none;max-width:88vw}
/* 庆祝 */
#cele{position:fixed;inset:0;z-index:98;display:none;flex-direction:column;align-items:center;justify-content:center;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(4px)}
#cele .t1{font-size:24px;font-weight:800;margin-top:14px;font-family:var(--head-font)}
#cele .t2{font-size:14px;color:var(--muted);margin-top:6px}
</style>
<script>document.documentElement.classList.add('js')</script>
</head>
<body data-mode="A">
<div class="toast" id="toast"></div>
<div id="cele"><svg width="92" height="92" viewBox="0 0 56 56"><circle cx="28" cy="28" r="8" fill="#3E8E5A"/><circle cx="28" cy="28" r="16" fill="none" stroke="#3E8E5A" stroke-width="2.5" opacity=".45"><animate attributeName="r" from="10" to="25" dur="1s" repeatCount="2"/><animate attributeName="opacity" from=".6" to="0" dur="1s" repeatCount="2"/></circle></svg><div class="t1" id="celeT1"></div><div class="t2" id="celeT2"></div></div>

<div class="wrap" id="onb" style="display:none">
  <svg width="52" height="52" viewBox="0 0 56 56"><circle cx="28" cy="28" r="8" fill="#E8604C"/><circle cx="28" cy="28" r="16" fill="none" stroke="#E8604C" stroke-width="2.5" opacity=".45"/><circle cx="28" cy="28" r="24" fill="none" stroke="#E8604C" stroke-width="2" opacity=".2"/></svg>
  <h1 class="logo">念响 <span style="color:var(--accent)">Reecho</span></h1>
  <div class="slogan">事事有回应,句句有回响。</div>
  <div class="slogan" style="margin-top:2px">两个人的双向备忘录 · 免注册,建小家发邀请码即可</div>
  <div class="onb-card">
    <div class="seg"><button id="segNew" class="on">建小家</button><button id="segJoin">用邀请码加入</button></div>
    <div id="fNew">
      <label>你的昵称</label><input id="nick1" placeholder="比如:圆圆" maxlength="12">
      <label>小家名字(可选)</label><input id="spname" placeholder="我们的小家" maxlength="16">
      <button class="btn" id="btnNew">创建并生成邀请码</button>
      <p style="font-size:12px;color:var(--muted);margin-top:10px">数据保存在本设备与云端小家里;创建后请把邀请码发给 TA。</p>
    </div>
    <div id="fJoin" style="display:none">
      <label>你的昵称</label><input id="nick2" placeholder="比如:大熊" maxlength="12">
      <label>邀请码</label><input id="code" placeholder="NN-XXXX" style="text-transform:uppercase" maxlength="7">
      <button class="btn" id="btnJoin">加入小家</button>
    </div>
  </div>
</div>

<div class="wrap" id="app" style="display:none">
  <header>
    <div style="min-width:0"><div class="sp" id="spName">小家</div><div class="slogan" id="meName"></div></div>
    <div style="display:flex;gap:6px;flex:none"><button class="chip mode" id="modeChip">模式</button><button class="chip" id="setChip">设置</button></div>
  </header>
  <div class="stats" id="stats"></div>
  <div class="eline" id="eline"></div>
  <div class="tabs" id="tabs">
    <button data-f="all" class="on">全部</button><button data-f="mine">我发出的</button><button data-f="todo">我收到的</button>
  </div>
  <div class="searchrow"><input id="q" placeholder="搜历史…"><button class="clr" id="qclr">×</button></div>
  <div id="list"></div>
</div>

<div class="composer" id="composer" style="display:none">
  <div class="row">
    <textarea id="txt"></textarea>
    <button class="mic" id="mic" title="点一下说话">🎙️</button>
    <button class="send" id="send" title="发送">↑</button>
  </div>
</div>

<div class="sheet" id="sheet"><div class="in" id="sheetIn"></div></div>

<script>
/* ============ 五模式话术包(规格书 docs/MODE_SPEC.md) ============ */
const MODES={
  A:{name:'念响',en:'REECHO',desc:'温柔回响 · 默认',sw:'linear-gradient(135deg,#E8604C,#2C3A42)',
    unit:'念念',states:{received:'收到',doing:'在办',done:'办妥'},ph:'说件事,让它有着落…',
    ai:'🧭 请 AI 僚机出方案',aiRun:'僚机调研中,好了会出现在这里…',aiSee:'🧭 看 AI 僚机方案',
    cele:['办妥 ✓ 你做到了','TA 那边,已经有回响了'],notif:'🌸 有回响',doneVerb:'办妥了',
    stat1:'我的念念办妥率',stat2:'待我回响',stat3:'AI 僚机方案',notePrompt:'办妥啦!给 TA 留一句交待(可选):'},
  B:{name:'拉勾勾',en:'PINKY PROMISE',desc:'拉过勾的事,不许忘',sw:'linear-gradient(135deg,#F4A7B9,#C73E3A)',
    unit:'勾勾',states:{received:'拉勾成立',doing:'勾着呢',done:'盖章兑现'},ph:'说个事,拉个勾…',
    ai:'🤙 让小指头帮你想',aiRun:'小指头翻资料中…',aiSee:'🤙 看小指头的方案',
    cele:['说到做到!','这一勾,兑现了。盖章!'],notif:'✅ 说到做到',doneVerb:'兑现了',
    stat1:'我的兑现率',stat2:'待我兑现',stat3:'小指头方案',notePrompt:'兑现啦!给 TA 留句话(可选):'},
  C:{name:'女王陛下',en:'HER MAJESTY',desc:'圣旨已到,忠犬接旨',sw:'linear-gradient(135deg,#241B26,#C9A227)',
    unit:'圣旨',states:{received:'汪!遵命',doing:'摇尾巴中',done:'办妥·求摸头'},ph:'颁一道旨意…',
    ai:'👑 宣军师觐见',aiRun:'军师彻夜翻典籍中…',aiSee:'👑 看军师的折子',
    cele:['干得漂亮','赏你一次摸头 :)'],notif:'👑 爱卿办妥了',doneVerb:'办妥了',
    stat1:'本周护驾达成率',stat2:'待接旨',stat3:'军师折子',notePrompt:'复命吧!给陛下留一句(可选):',
    confirm:'「女王陛下」是双人趣味模式:你的界面话术会变成女王与忠犬的设定(仅本机显示,对方不受影响),随时可一键切回。开启吗?'},
  D:{name:'毒舌修勾',en:'ROASTPUP',desc:'你对象不听话?让狗来管',sw:'linear-gradient(135deg,#D6F740,#141414)',
    unit:'任务',states:{received:'汪,别催',doing:'修勾搬砖中',done:'交作业!'},ph:'说,让狗记着…',
    ai:'🐶 叫狗头军师',aiRun:'狗头军师抓耳挠腮中…',aiSee:'🐶 看狗头军师的骚主意',
    cele:['交作业!','赏小饼干 ×1 🍪'],notif:'🍪 狗交作业了',doneVerb:'交作业了',
    stat1:'本周交作业率',stat2:'监工中',stat3:'军师主意',notePrompt:'交作业!附一句求饼干宣言(可选):'},
  E:{name:'爸妈听话',en:'OKPARENTS',desc:'换我来啰嗦你 · 大字版',sw:'linear-gradient(135deg,#F6EFE3,#8A2B23)',
    unit:'牵挂',states:{received:'看到了',doing:'在办呢',done:'办好了'},ph:'说句话,TA 看得见…',
    ai:'💡 让 AI 帮着拿主意',aiRun:'AI 在想办法…',aiSee:'💡 看 AI 的建议',
    cele:['办好了','TA 就放心了'],notif:'❤️ 办好了',doneVerb:'办好了',
    stat1:'都办好了吗',stat2:'还没办',stat3:'AI 建议',notePrompt:'办好了!说一句让 TA 放心(可选):'},
};
let MODE=localStorage.ee_mode||'A';

const $=s=>document.querySelector(s);
const API=p=>fetch('/api'+p.path,{method:p.m||'GET',headers:{...(auth()?{authorization:'Bearer '+auth().token}:{}),...(p.h||{}),...(p.body&&!(p.body instanceof Blob)?{'content-type':'application/json'}:{})},body:p.body?(p.body instanceof Blob?p.body:JSON.stringify(p.body)):undefined}).then(r=>p.raw?r:r.json());
if(location.hash.startsWith('#auth=')){try{localStorage.ee_auth=atob(location.hash.slice(6));history.replaceState(null,'',location.pathname+location.search)}catch(e){}}
const auth=()=>{try{return JSON.parse(localStorage.ee_auth||'null')}catch(e){return null}};
const toast=m=>{const t=$('#toast');t.textContent=m;t.style.display='block';clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',2600)};
const ago=ts=>{const d=Date.now()-ts;if(d<60e3)return'刚刚';if(d<3600e3)return Math.floor(d/60e3)+' 分钟前';if(d<86400e3)return Math.floor(d/3600e3)+' 小时前';return new Date(ts).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'})+'日'};
const esc=s=>s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const M=()=>MODES[MODE];
let ME=null,MEMBERS=[],ITEMS=[],FILTER='all',Q='',PREV={},lastSeen=Number(localStorage.ee_seen||0);

/* ============ 模式引擎 ============ */
function applyMode(m,silent){
  if(m==='C'&&MODE!=='C'&&!silent){if(!confirm(MODES.C.confirm))return}
  MODE=m;localStorage.ee_mode=m;document.body.dataset.mode=m;
  $('#txt').placeholder=M().ph;
  document.querySelector('meta[name=theme-color]').content=getComputedStyle(document.body).getPropertyValue('--bg').trim();
  if(ME)render();
  if(!silent)toast(`已切换到「${M().name}」模式`);
}
function modeSheet(){
  $('#sheetIn').innerHTML='<h3>选择人格模式</h3><div class="modegrid">'+Object.entries(MODES).map(([k,v])=>
    `<div class="mcard ${k===MODE?'on':''}" onclick="applyMode('${k}');$('#sheet').classList.remove('show')">
      <div class="sw" style="background:${v.sw}"></div>
      <div><b>${v.name} <span style="font-size:10px;color:var(--muted);letter-spacing:1px">${v.en}</span></b><p>${v.desc}</p></div>
    </div>`).join('')+'</div><p style="font-size:12px;color:var(--muted);margin-top:12px">模式只改变你这台设备的界面与话术,不影响对方;数据完全一致。</p>';
  $('#sheet').classList.add('show');
}

/* ============ onboarding ============ */
$('#segNew').onclick=()=>{$('#segNew').classList.add('on');$('#segJoin').classList.remove('on');$('#fNew').style.display='';$('#fJoin').style.display='none'};
$('#segJoin').onclick=()=>{$('#segJoin').classList.add('on');$('#segNew').classList.remove('on');$('#fJoin').style.display='';$('#fNew').style.display='none'};
$('#btnNew').onclick=async()=>{const n=$('#nick1').value.trim();if(!n)return toast('先填昵称');
  const r=await API({path:'/space',m:'POST',body:{nickname:n,name:$('#spname').value.trim()}});
  if(!r.token)return toast(r.error||'创建失败');
  localStorage.ee_auth=JSON.stringify(r);await boot();inviteSheet(r.invite_code,true)};
$('#btnJoin').onclick=async()=>{const n=$('#nick2').value.trim(),c=$('#code').value.trim();if(!n||!c)return toast('昵称和邀请码都要填');
  const r=await API({path:'/join',m:'POST',body:{nickname:n,invite_code:c}});
  if(!r.token)return toast(r.error||'加入失败');
  localStorage.ee_auth=JSON.stringify(r);toast('结对成功!');boot()};
function inviteSheet(code,first){
  $('#sheetIn').innerHTML=`<h3>${first?'小家建好了!':'邀请码'}</h3><div class="bigcode"><div class="code">${esc(code)}</div>
    <p>把这串码发给 TA,输入即结对。${first?'现在就发过去吧:':''}</p>
    <button class="btn" onclick="navigator.clipboard&&navigator.clipboard.writeText('${esc(code)}');this.textContent='已复制 ✓ 去微信粘贴给 TA'">复制邀请码</button></div>`;
  $('#sheet').classList.add('show');
}

/* ============ 主流程 ============ */
async function boot(){
  if(!auth()){$('#onb').style.display='';$('#app').style.display='none';$('#composer').style.display='none';return}
  $('#onb').style.display='none';$('#app').style.display='';$('#composer').style.display='';
  const me=await API({path:'/me'});
  if(me.error){localStorage.removeItem('ee_auth');return boot()}
  ME=me.me;MEMBERS=me.members;window._space=me.space;
  $('#spName').textContent=me.space.name;$('#meName').textContent='我是 '+ME.nickname;
  if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();
  if(!localStorage.ee_hint){$('#composer').classList.add('hint');setTimeout(()=>{$('#composer').classList.remove('hint');localStorage.ee_hint=1},6000)}
  await refresh();
}
async function refresh(){
  const r=await API({path:'/items'});if(r.error)return;
  const fresh=r.items.filter(i=>i.created_at>lastSeen&&i.from_member!==ME.id);
  if(fresh.length&&lastSeen&&'Notification'in window&&Notification.permission==='granted')
    new Notification(M().name+' · '+nick(fresh[0].from_member),{body:fresh[0].text.slice(0,60)});
  if(r.items.length){lastSeen=Math.max(lastSeen,...r.items.map(i=>i.created_at));localStorage.ee_seen=lastSeen}
  for(const i of r.items){
    if(i.from_member===ME.id&&PREV[i.id]&&PREV[i.id]!=='done'&&i.status==='done'){
      const doer=(MEMBERS.find(m=>m.id!==ME.id)||{}).nickname||'TA';
      const msg=`${doer} ${M().doneVerb}「${i.text.slice(0,16)}」`+(i.note?`:${i.note.slice(0,18)}`:'');
      toast(M().notif+':'+msg);
      if('Notification'in window&&Notification.permission==='granted')new Notification(M().notif,{body:msg});
    }
    PREV[i.id]=i.status;
  }
  ITEMS=r.items;render();
}
const nick=id=>(MEMBERS.find(m=>m.id===id)||{}).nickname||'TA';

function render(){
  const m=M();
  const mine=ITEMS.filter(i=>i.from_member===ME.id),todo=ITEMS.filter(i=>i.from_member!==ME.id);
  const done=mine.filter(i=>i.status==='done').length;
  $('#stats').innerHTML=
    `<div class="stat"><b>${mine.length?Math.round(done/mine.length*100)+'%':'—'}</b><span>${m.stat1}</span></div>`+
    `<div class="stat"><b>${todo.filter(i=>i.status!=='done').length}</b><span>${m.stat2}</span></div>`+
    `<div class="stat"><b>${ITEMS.filter(i=>i.research==='done').length}</b><span>${m.stat3}</span></div>`;
  $('#eline').textContent=`今天的牵挂:${todo.filter(i=>i.status!=='done').length} 件还没办,${todo.filter(i=>i.status==='done').length} 件办好了`;
  document.querySelectorAll('#tabs button').forEach(b=>{
    const f=b.dataset.f,n=f==='all'?ITEMS.length:f==='mine'?mine.length:todo.length;
    b.textContent={all:'全部',mine:'我发出的',todo:'我收到的'}[f]+(n?` ${n}`:'');
  });
  let list=FILTER==='mine'?mine:FILTER==='todo'?todo:ITEMS;
  if(Q)list=list.filter(i=>(i.text+(i.note||'')).toLowerCase().includes(Q));
  $('#qclr').style.display=Q?'block':'none';
  if(!list.length&&!ITEMS.length){
    $('#list').innerHTML=`<div class="empty">还没有${m.unit}。先看一张示例:</div>`+sampleCard();
  }else{
    $('#list').innerHTML=list.length?list.map((i,ix)=>card(i,ix)).join(''):
      `<div class="empty">${Q?'没搜到「'+esc(Q)+'」':'这个分类下还没有'+m.unit}</div>`;
  }
}
function sampleCard(){
  const m=M();
  return `<div class="card sample"><div class="meta"><span>TA · 🎙️ 语音 <span class="ghost">示例</span></span><span>刚刚</span></div>
    <div class="txt">周五帮我取一下干洗的裙子,顺便买两盒草莓</div>
    <div class="flow"><button class="st on-received">${m.states.received}</button><button class="st">${m.states.doing}</button><button class="st">${m.states.done}</button></div>
    <div class="ai"><button>${m.ai}</button></div></div>`;
}
function card(i,ix){
  const m=M(),isMine=i.from_member===ME.id;
  const stBtn=(k)=>`<button class="st ${i.status===k?'on-'+k:''} ${ix===0&&!isMine&&i.status==='received'&&k==='received'&&!localStorage.ee_st_hint?'pulse':''}" onclick="setStatus('${i.id}','${k}')">${m.states[k]}</button>`;
  let flow=`<div class="flow">${stBtn('received')}${stBtn('doing')}${stBtn('done')}`;
  if(i.status==='doing')flow+=`<span class="pct">${i.progress}%</span></div><input class="prog" type="range" min="0" max="100" value="${i.progress}" onchange="setProgress('${i.id}',this.value)">`;
  else flow+='</div>';
  let ai='<div class="ai">';
  if(i.research==='none')ai+=`<button onclick="wantResearch('${i.id}')">${m.ai}</button>`;
  else if(i.research==='wanted'||i.research==='running')ai+=`<span class="running">${m.aiRun}</span>`;
  else if(i.research==='done')ai+=`<a href="javascript:openPage('${i.id}')">${m.aiSee}</a>`;
  else ai+=`<span class="running">这次没弄成</span> <button onclick="wantResearch('${i.id}')">再试</button>`;
  ai+='</div>';
  const ghost=MODE==='D'&&i.status==='received'&&Date.now()-i.updated_at>48*3600e3?`<span class="ghost">已鸽 ${Math.floor((Date.now()-i.updated_at)/86400e3)} 天</span>`:'';
  const decree=MODE==='C'?`<div class="decree">圣旨 NO.${String(i.id).slice(0,4).toUpperCase()}</div>`:'';
  const stamp=MODE==='B'&&i.status==='done'?'<div class="stamp">说到<br>做到</div>':'';
  return `<div class="card ${i.status==='done'?'done-card':''}">${decree}${stamp}
    <div class="meta"><span>${esc(nick(i.from_member))}${isMine?'(我)':''} · ${i.kind==='voice'?'🎙️ 语音':'✏️ 文字'}${ghost}</span><span>${ago(i.created_at)}</span></div>
    <div class="txt">${esc(i.text)}</div>
    ${i.audio_key?`<div class="voice"><button onclick="playVoice('${encodeURIComponent(i.audio_key)}',this)">▶ 听原声</button></div>`:''}
    ${flow}
    ${i.status==='done'&&i.note?`<div class="note">✅ ${esc(i.note)}</div>`:''}
    ${ai}
  </div>`;
}
window.setStatus=async(id,st)=>{
  localStorage.ee_st_hint=1;
  let body={status:st};
  if(st==='done'){const n=prompt(M().notePrompt);if(n)body.note=n}
  const r=await API({path:'/items/'+id,m:'PATCH',body});
  if(r.error)return toast(r.error);
  if(st==='done')celebrate();
  refresh();
};
window.setProgress=async(id,v)=>{await API({path:'/items/'+id,m:'PATCH',body:{progress:Number(v),status:'doing'}});refresh()};
window.wantResearch=async id=>{await API({path:'/items/'+id,m:'PATCH',body:{research:'wanted'}});toast(M().aiRun);refresh()};
window.openPage=async id=>{const r=await API({path:'/items/'+id+'/sharelink'});if(r.url)open(r.url);else toast(r.error||'方案还没好')};
window.playVoice=async(k,btn)=>{btn.textContent='…';const r=await API({path:'/audio/'+k,raw:true});const b=await r.blob();new Audio(URL.createObjectURL(b)).play();btn.textContent='▶ 听原声'};
function celebrate(){
  $('#celeT1').textContent=M().cele[0];$('#celeT2').textContent=M().cele[1];
  const c=$('#cele');c.style.display='flex';setTimeout(()=>c.style.display='none',2000);
}

/* ============ 发送 ============ */
$('#send').onclick=async()=>{const t=$('#txt').value.trim();if(!t)return;
  $('#txt').value='';const r=await API({path:'/items',m:'POST',body:{text:t}});
  if(r.error){toast('发送失败:'+r.error);$('#txt').value=t;return}
  refresh()};
let rec=null,chunks=[];
$('#mic').onclick=async()=>{
  if(rec&&rec.state==='recording'){rec.stop();return}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const mime=MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/mp4';
    rec=new MediaRecorder(stream,{mimeType:mime});chunks=[];
    rec.ondataavailable=e=>chunks.push(e.data);
    rec.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());$('#mic').classList.remove('rec');
      const blob=new Blob(chunks,{type:mime});toast('转写中…');
      const r=await API({path:'/voice',m:'POST',h:{'content-type':mime},body:blob});
      if(r.ok){toast('已发送:'+(r.transcript||'').slice(0,24));refresh()}
      else toast((r.error||'发送失败')+' · 点🎙️重录一次');
    };
    rec.start();$('#mic').classList.add('rec');toast('录音中,再点一下结束');
  }catch(e){toast('需要麦克风权限')}
};
$('#q').oninput=e=>{Q=e.target.value.trim().toLowerCase();render()};
$('#qclr').onclick=()=>{$('#q').value='';Q='';render()};
document.querySelectorAll('#tabs button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#tabs button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');FILTER=b.dataset.f;render()});
$('#modeChip').onclick=modeSheet;
$('#setChip').onclick=()=>{
  $('#sheetIn').innerHTML=`<h3>设置</h3>
    <div class="row2"><span>小家成员</span><span>${MEMBERS.map(m=>esc(m.nickname)).join('、')}</span></div>
    <div class="row2"><span>邀请码</span><button class="chip" onclick="inviteSheet(window._space.invite_code)">查看/复制</button></div>
    <div class="row2"><span>人格模式</span><button class="chip" onclick="modeSheet()">${M().name} · 切换</button></div>
    <div class="row2"><span>硬件(挂坠/DJI 麦克风)</span><button class="chip" onclick="mkDevice()">生成设备 Token</button></div>
    <div class="row2"><span>退出登录</span><button class="chip" onclick="localStorage.removeItem('ee_auth');location.reload()">退出</button></div>
    <p style="font-size:12px;color:var(--muted);margin-top:14px">念响 Reecho v1.1.0 · AI 方案免费 5 次起 · 会员(心动/陪伴/珍藏)随发布计划上线</p>`;
  $('#sheet').classList.add('show')};
$('#sheet').onclick=e=>{if(e.target.id==='sheet')$('#sheet').classList.remove('show')};
window.mkDevice=async()=>{const r=await API({path:'/devices',m:'POST',body:{label:'硬件'}});
  prompt('把这个 Token 写进你的硬件(按下录音,松手上传):',r.device_token)};
window.inviteSheet=inviteSheet;window.applyMode=applyMode;window.modeSheet=modeSheet;window.$=$;

setInterval(()=>{if(auth()&&ME)refresh()},12000);
window.addEventListener('focus',()=>{if(auth()&&ME)refresh()});
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js');
const pm=new URLSearchParams(location.search).get('mode');
if(pm&&MODES[pm.toUpperCase()])MODE=pm.toUpperCase();
applyMode(MODE,true);
boot();
</script>
</body>
</html>
